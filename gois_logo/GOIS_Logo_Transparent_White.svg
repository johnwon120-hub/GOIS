<?xml version="1.0" encoding="UTF-8"?>
<svg width="3200" height="1280" viewBox="0 0 3200 1280"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <style>
      .logo-name {
        font-family: 'Josefin Sans', 'Futura', 'Century Gothic', Arial, sans-serif;
        font-weight: 400;
        font-size: 220px;
        letter-spacing: 36px;
        fill: #ffffff;
      }
      .logo-sub {
        font-family: 'Josefin Sans', 'Futura', 'Century Gothic', Arial, sans-serif;
        font-weight: 300;
        font-size: 38px;
        letter-spacing: 9px;
        fill: #aaaaaa;
      }
    </style>
  </defs>

  <!-- Background -->
  

  <!-- Symbol: arc -->
  <path d="M383.14,556.86 A117.60,117.60 0 1,0 383.14,723.14"
        fill="none" stroke="#ffffff" stroke-width="13.44"
        stroke-linecap="round"/>
  <!-- Symbol: center node -->
  <circle cx="300.00" cy="640.00" r="16.24" fill="#ffffff"/>
  <!-- Symbol: top node -->
  <circle cx="383.14" cy="556.86" r="9.24" fill="#ffffff"/>
  <!-- Symbol: bottom node -->
  <circle cx="383.14" cy="723.14" r="9.24" fill="#ffffff"/>

  <!-- Divider -->
  <line x1="488" y1="480.0" x2="488" y2="800.0"
        stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>

  <!-- GOIS wordmark -->
  <text x="540" y="672.0" class="logo-name">GOIS</text>

  <!-- Green underline -->
  <line x1="540" y1="708.0" x2="1140" y2="708.0"
        stroke="#ffffff" stroke-width="4.0"/>

  <!-- Full name -->
  <text x="541" y="764.0" class="logo-sub">GLOCAL  OPEN  INNOVATION  STUDIO</text>

</svg>